name: "lint and test"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-and-test:
    uses: esclient/tools/.github/workflows/lint-and-test-cpp.yml@linting-job-optimization
    with:
      sonar-inclusions: "src/**,tests/**"
      sonar-exclusions: "**/generated/**,**/grpc/**,tests/mocks/**,tests/unit/**"
      sonar-coverage-exclusions: "tests/mocks/**,tests/unit/**,src/moderationservice/main.cpp,src/moderationservice/server/server.cpp"
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}